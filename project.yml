name: YKSQuestionSolver
options:
  bundleIdPrefix: com.goktan
  deploymentTarget:
    iOS: "17.0"
  swiftVersion: "5.9"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.goktan.yksquestionsolvinginmetro
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: '["UIInterfaceOrientationPortrait"]'
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "PDF dosyalarını seçmek için Fotoğraflar erişimi gerekir"
    INFOPLIST_KEY_NSFileProviderDomainUsageDescription: "Files uygulaması üzerinden PDF içe aktarmak için"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      MTL_DEBUG_LAYER: YES
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  YKSQuestionSolver:
    type: application
    platform: iOS
    sources:
      - path: Models
      - path: Views
      - path: Services
      - path: ViewModels
      - path: ML
      - path: Utils
    resources:
      - path: Resources
    entitlements: Entitlements.entitlements
    dependencies: []
    settings:
      base:
        PRODUCT_NAME: YKSQuestionSolver
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "YKS Soru Çözücü"
        INFOPLIST_KEY_CFBundleShortVersionString: "1.0"
        INFOPLIST_KEY_CFBundleVersion: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  YKSQuestionSolverTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: YKSQuestionSolver
