name: YKSQuestionSolver
options:
  bundleIdPrefix: com.goktan
  deploymentTarget:
    iOS: "17.0"
  swiftVersion: "5.9"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.goktan.yksquestionsolvinginmetro
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  YKSQuestionSolver:
    type: application
    platform: iOS
    sources:
      - globs:
          - "Models/**/*.swift"
          - "Views/**/*.swift"
          - "Services/**/*.swift"
          - "ViewModels/**/*.swift"
          - "ML/**/*.swift"
          - "Utils/**/*.swift"
    entitlements:
      com.apple.security.app-sandbox: true
      com.apple.security.files.user-selected.read-only: true
    settings:
      base:
        PRODUCT_NAME: YKSQuestionSolver
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "YKS Soru Çözücü"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
