name: Build IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-ipa:
    name: Build & Export IPA
    runs-on: macos-14  # Xcode 15.4
    timeout-minutes: 40
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Verify Project
        run: |
          ls -la YKSQuestionSolver.xcodeproj/
          xcodebuild -list -project YKSQuestionSolver.xcodeproj

      - name: Build & Archive
        run: |
          xcodebuild archive \
            -project YKSQuestionSolver.xcodeproj \
            -scheme YKSQuestionSolver \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/YKSQuestionSolver.xcarchive \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PRODUCT_BUNDLE_IDENTIFIER="com.goktan.yksquestionsolvinginmetro"

      - name: Export IPA
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key><string>development</string>
              <key>signingStyle</key><string>automatic</string>
              <key>teamID</key><string></string>
              <key>compileBitcode</key><false/>
              <key>thinning</key><string><none></string>
              <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath ./build/YKSQuestionSolver.xcarchive \
            -exportPath ./build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Verify IPA
        run: |
          ls -la ./build/ipa/
          file ./build/ipa/*.ipa
          unzip -l ./build/ipa/*.ipa | head -20

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YKSQuestionSolver-IPA
          path: ./build/ipa/*.ipa
          retention-days: 7
