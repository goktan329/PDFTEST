name: Build IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-ipa:
    name: Build & Export IPA
    runs-on: macos-14
    timeout-minutes: 45
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Install XcodeGen (Homebrew with Tap Trust Fix)
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          brew update
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml
          echo "=== Project generated ==="
          ls -la YKSQuestionSolver.xcodeproj/
          xcodebuild -list -project YKSQuestionSolver.xcodeproj

      - name: Build & Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project YKSQuestionSolver.xcodeproj \
            -scheme YKSQuestionSolver \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath 
