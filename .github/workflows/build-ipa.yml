name: Build IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-ipa:
    name: Build & Export IPA
    runs-on: macos-14
    timeout-minutes: 45
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Install XcodeGen (Binary - No Homebrew)
        run: |
          # XcodeGen 2.38.0 binary'sini GitHub Releases'dan indir
          curl -L -o xcodegen.zip https://github.com/xcodegen/xcodegen/releases/download/2.38.0/xcodegen.zip
          unzip -o xcodegen.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/xcodegen
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml
          echo "=== Project generated ==="
          ls -la YKSQuestionSolver.xcodeproj/
          xcodebuild -list -project YKSQuestionSolver.xcodeproj

      - name: Build & Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project YKSQuestionSolver.xcodeproj \
            -scheme YKSQuestionSolver \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/YKSQuestionSolver.xcarchive \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PRODUCT_BUNDLE_IDENTIFIER="com.goktan.yksquestionsolvinginmetro" \
            2>&1 | tee build.log
          echo "=== BUILD EXIT CODE: ${PIPESTATUS[0]} ==="
          tail -80 build.log

      - name: Export IPA
        if: success()
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key><string>development</string>
              <key>signingStyle</key><string>automatic</string>
              <key>teamID</key><string></string>
              <key>compileBitcode</key><false/>
              <key>thinning</key><string><none></string>
              <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath ./build/YKSQuestionSolver.xcarchive \
            -exportPath ./build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            2>&1 | tee export.log
          echo "=== EXPORT EXIT CODE: ${PIPESTATUS[0]} ==="
          tail -40 export.log

      - name: Verify IPA
        if: success()
        run: |
          ls -la ./build/ipa/
          file ./build/ipa/*.ipa
          unzip -l ./build/ipa/*.ipa | head -30

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: YKSQuestionSolver-IPA
          path: ./build/ipa/*.ipa
          retention-days: 7

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            build.log
            export.log
          retention-days: 3
