name: Build IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-ipa:
    name: Build & Export IPA
    runs-on: macos-14
    timeout-minutes: 45
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Install XcodeGen (Homebrew with Tap Trust Fix)
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          brew update
          brew install xcodegen
          xcodegen --version

      - name: Prepare Sources Directory (Flatten all .swift files)
        run: |
          mkdir -p Sources
          copied=0
          for dir in Models Views Services ViewModels ML Utils; do
            if [ -d "$dir" ]; then
              # Klasörü Sources/ altına kopyala (içindeki .swift dosyaları ile)
              cp -R "$dir" Sources/
              count=$(find "Sources/$dir" -name "*.swift" | wc -l)
              echo "✓ Copied $dir ($count .swift files)"
              copied=$((copied + count))
            else
              echo "✗ $dir not found in repo root"
            fi
          done
          # Resources varsa kopyala
          if [ -d "Resources" ]; then
            cp -R Resources Sources/
            echo "✓ Copied Resources"
          fi
          # Loose .swift files in root
          for f in *.swift; do
            if [ -f "$f" ]; then
              cp "$f" Sources/
              echo "✓ Copied loose $f"
              copied=$((copied + 1))
            fi
          done
          echo "=== Total .swift files in Sources: $copied ==="
          if [ "$copied" -eq 0 ]; then
            echo "WARNING: No .swift files found! Creating dummy main.swift"
            echo 'import SwiftUI
@main
struct YKSQuestionSolverApp: App {
    var body: some Scene {
        WindowGroup { Text("No source files found") }
    }
}' > Sources/main.swift
          fi
          find Sources -name "*.swift" | head -20

      - name: Verify project.yml Content
        run: |
          echo "=== project.yml ==="
          cat project.yml

      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml
          echo "=== Project generated ==="
          ls -la YKSQuestionSolver.xcodeproj/
          xcodebuild -list -project YKSQuestionSolver.xcodeproj

      - name: Build & Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project YKSQuestionSolver.xcodeproj \
            -scheme YKSQuestionSolver \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/YKSQuestionSolver.xcarchive \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PRODUCT_BUNDLE_IDENTIFIER="com.goktan.yksquestionsolvinginmetro" \
            2>&1 | tee build.log
          echo "=== BUILD EXIT CODE: ${PIPESTATUS[0]} ==="
          tail -80 build.log

      - name: Export IPA
        if: success()
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key><string>development</string>
              <key>signingStyle</key><string>automatic</string>
              <key>teamID</key><string></string>
              <key>compileBitcode</key><false/>
              <key>thinning</key><string><none></string>
              <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath ./build/YKSQuestionSolver.xcarchive \
            -exportPath ./build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            2>&1 | tee export.log
          echo "=== EXPORT EXIT CODE: ${PIPESTATUS[0]} ==="
          tail -40 export.log

      - name: Verify IPA
        if: success()
        run: |
          ls -la ./build/ipa/
          file ./build/ipa/*.ipa
          unzip -l ./build/ipa/*.ipa | head -30

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: YKSQuestionSolver-IPA
          path: ./build/ipa/*.ipa
          retention-days: 7

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            build.log
            export.log
          retention-days: 3
